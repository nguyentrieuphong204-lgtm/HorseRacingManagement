<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản - Horse Racing System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #f4fbf9;
            --secondary-bg: #f0f9f7;
            --card-bg: #ffffff;
            --border-color: #10b981;
            --accent-green: #10b981;
            --accent-dark-green: #059669;
            --text-primary: #065f46;
            --text-secondary: #047857;
            --transition: 0.3s ease-in-out;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f4fbf9 0%, #e6f7f2 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 35px rgba(16, 185, 129, 0.15);
            text-align: center;
        }

        .card h2 {
            font-size: 32px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #065f46, #10b981);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .card > p {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 15px;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 16px 32px;
            cursor: pointer;
            border: 2px solid var(--border-color);
            background: white;
            border-radius: 60px;
            font-weight: bold;
            font-size: 16px;
            color: var(--text-primary);
            transition: all var(--transition);
            flex: 1;
            min-width: 180px;
        }

        .tab-btn:hover {
            background: var(--accent-green);
            color: white;
            border-color: var(--accent-green);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Đăng Ký Hệ Thống</h2>
        <p>Chọn vai trò</p>
        
        <div class="tabs">
            <button class="tab-btn" onclick="window.location.href='horse-registration.html'">🐴 Đăng Ký Chủ Ngựa</button>
            <button class="tab-btn" onclick="window.location.href='Jockey-management.html'">🏇 Đăng Ký Jockey</button>
            <button class="tab-btn" onclick="window.location.href='spectator-registration.html'">👥 Đăng ký thành viên</button>
        </div>
    </div>
</body>
</html>
