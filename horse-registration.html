<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horse Registration - Horse Racing System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

       :root {
            --primary-bg: #ffffff;
            --secondary-bg: #f0f9f7;
            --card-bg: #ffffff;
            --border-color: #10b981;
            --accent-green: #10b981;
            --accent-dark-green: #059669;
            --text-primary: #065f46;
            --text-secondary: #047857;
            --transition: 0.3s ease-in-out;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--primary-bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }
.card, .form-container {
            background: var(--card-bg);
            /* Thay border mờ bằng viền xanh lá đậm, dày hơn */
            border: 2px solid var(--accent-green) !important; 
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 30px;
            /* Thêm đổ bóng để khung tách biệt hẳn với nền */
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.2); 
        }

        /* ============== HEADER ============== */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent-blue), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* ============== PROGRESS STEPS ============== */
        .progress-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            position: relative;
        }

        .step-number {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-bottom: 8px;
            transition: all var(--transition);
        }

        .step.active .step-number {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .step-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
        }

        .step-connector {
            position: absolute;
            top: 24px;
            left: calc(100% + 12px);
            width: calc(100% - 24px);
            height: 2px;
            background: var(--border-color);
            display: none; 
        }

        /* ============== CARD ============== */
        .card {
            background: var(--card-bg);
            border: none;
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .card-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 30px;
            color: var(--accent-blue);
        }

        /* ============== FORM SECTION ============== */
        .form-section {
            margin-bottom: 40px;
        }

        .section-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    padding-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    /* Thêm đường kẻ dưới tiêu đề với màu xanh lá của hệ thống */
    border-bottom: 2px solid var(--secondary-bg); 
    color: var(--accent-dark-green);
}

        /* ============== FORM GROUP ============== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-label .required {
            color: var(--accent-red);
        }

        .form-input,
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all var(--transition);
        }

        .form-input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* ============== RADIO/CHECKBOX ============== */
        .radio-group,
        .checkbox-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .radio-item,
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-item input[type="radio"],
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-blue);
        }

        /* ============== FILE UPLOAD ============== */
        .file-upload {
            position: relative;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
        }

        .file-upload:hover {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.05);
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .file-upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .file-upload-text {
            margin-bottom: 5px;
        }

        .file-upload-hint {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* ============== UPLOADED FILES ============== */
        .uploaded-files {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }

        .file-item {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .file-item-remove {
            cursor: pointer;
            color: var(--accent-red);
            font-weight: bold;
        }

        /* ============== BUTTONS ============== */
        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 40px;
        }

        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all var(--transition);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), #8b5cf6);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: var(--secondary-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--accent-blue);
        }

        /* ============== ALERT ============== */
        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
        }

        /* ============== RESPONSIVE ============== */
        @media (max-width: 768px) {
            .card {
                padding: 24px;
            }

            .header h1 {
                font-size: 24px;
            }

            .form-grid-2 {
                grid-template-columns: 1fr;
            }

            .progress-steps {
                flex-direction: column;
                gap: 16px;
            }

            .step-connector {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>🐴 Đăng Ký Ngựa</h1>
        </div>

        <!-- REGISTRATION FORM -->
        <div class="card">
            <div class="card-title">📋 Thông Tin Chủ Ngựa</div>

            <!-- OWNER INFORMATION -->
            <div class="form-section">
                <div class="section-title">
                    <span>👤</span> Thông Tin Chủ Sở Hữu
                </div>
                
                <div class="form-grid-2">
                    <div class="form-group">
                        <label class="form-label">Họ Tên <span class="required">*</span></label>
                        <input type="text" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email <span class="required">*</span></label>
                        <input type="email" class="form-input">
                    </div>
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label class="form-label">Số Điện Thoại <span class="required">*</span></label>
                        <input type="tel" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Địa Chỉ <span class="required"></span></label>
                        <input type="text" class="form-input">
                    </div>
                </div>
            </div>

            <!-- BUTTONS -->
            <div class="button-group">
                <button class="btn btn-secondary">← Quay Lại</button>
                <button class="btn btn-primary">Tiếp Tục →</button>
            </div>
        </div>
    </div>
</body>
</html>
