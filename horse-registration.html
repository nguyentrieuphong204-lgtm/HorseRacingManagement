<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horse Registration - Horse Racing System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #f4fbf9;
            --secondary-bg: #f0f9f7;
            --card-bg: #ffffff;
            --border-color: #10b981;
            --accent-green: #10b981;
            --accent-dark-green: #059669;
            --text-primary: #065f46;
            --text-secondary: #047857;
            --transition: 0.3s ease-in-out;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f4fbf9 0%, #e6f7f2 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #065f46, #10b981);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.1);
        }

        .card-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 30px;
            color: var(--accent-dark-green);
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }

        .form-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid var(--secondary-bg);
            color: var(--accent-dark-green);
        }

        .form-grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-primary);
        }

        .form-label .required {
            color: #ef4444;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--secondary-bg);
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
            background: white;
        }

        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 40px;
        }

        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            transition: all var(--transition);
        }

        .btn-primary {
            background: var(--accent-green);
            color: white;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:hover {
            background: var(--accent-dark-green);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: white;
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--accent-dark-green);
            background: var(--secondary-bg);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .card {
                padding: 24px;
            }
            .header h1 {
                font-size: 28px;
            }
            .button-group {
                flex-direction: column;
                align-items: center;
            }
            .btn {
                width: 100%;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Đăng Ký Ngựa Đua</h1>
        </div>

        <div class="card">
            <div class="card-title">📋 Thông Tin Đăng Ký</div>

            <div class="form-section">
                <div class="section-title">
                    <span>👤</span> Thông Tin Chủ Sở Hữu
                </div>
                
                <div class="form-grid-2">
                    <div class="form-group">
                        <label class="form-label">Họ Tên <span class="required">*</span></label>
                        <input type="text" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email <span class="required">*</span></label>
                        <input type="email" class="form-input">
                    </div>
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label class="form-label">Số Điện Thoại <span class="required">*</span></label>
                        <input type="tel" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Địa Chỉ</label>
                        <input type="text" class="form-input">
                    </div>
                </div>
            </div>
            <div class="file-upload" style="margin-top: 24px;">
                <div class="file-upload-icon"></div>
                <p>Kéo thả hoặc click để tải lên giấy tờ</p>
                <input type="file" accept=".pdf,.jpg,.png">
            </div>
        </div>
            <div class="button-group">
                <button class="btn btn-secondary" onclick="window.location.href='register.html'">← Quay Lại</button>
                <button class="btn btn-primary" onclick="alert('Chức năng đang được phát triển!')">Tiếp Tục →</button>
            </div>
        </div>
    </div>
</body>
</html>
