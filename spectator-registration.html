<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectator Registration - Horse Racing System</title>
    <style>
        :root {
            --primary-bg: #ffffff;
            --secondary-bg: #f0f9f7;
            --card-bg: #ffffff;
            --border-color: #10b981;
            --accent-green: #10b981;
            --accent-dark-green: #059669;
            --text-primary: #065f46;
            --text-secondary: #047857;
            --transition: 0.3s ease-in-out;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--primary-bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Đăng Ký Thành Viên (Khán Giả)</h2>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Trở thành thành viên để cập nhật lịch đua và đặt vé trực tuyến.</p>
    
    <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-input">
    </div>
    
    <div class="form-group">
        <label class="form-label">mật khẩu</label>
        <input type="tel" class="form-input">
    </div>

    <div class="form-group">
        <label class="form-label">Nhập Lại Mật Khẩu</label>
        <input type="tel" class="form-input">
    </div>
    <button class="btn-primary">Hoàn Tất Đăng Ký</button>
</div>

</body>
</html>
